    .controls{grid-template-columns:1.3fr .75fr 1fr}.subject-control{grid-template-columns:1fr}.option-control{grid-template-columns:1fr 1fr}.step-panel{display:grid;gap:1rem}.step-head{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}.step-head h2{margin:0;font-size:1.25rem}.subject-choice-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.75rem}.subject-choice{min-height:4rem;border:1px solid var(--border);border-radius:.5rem;background:var(--surface);padding:1rem;text-align:left;font-weight:800;color:var(--text);display:flex;justify-content:space-between;gap:.75rem;align-items:center}.subject-choice.active{border-color:var(--accent);background:var(--accent-soft)}.subject-choice span{color:var(--muted);font-size:.8rem;font-weight:700}.selection-summary{border:1px solid var(--border);border-radius:.5rem;background:var(--surface);padding:.9rem 1rem;display:grid;gap:.35rem}.selection-summary strong{font-size:1rem}.selection-summary span{color:var(--muted);font-size:.85rem}.genre-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.75rem;margin:0 0 1rem}.genre-card{border:1px solid var(--border);border-radius:.5rem;background:var(--surface);padding:1rem;text-align:left;display:grid;gap:.45rem}.genre-card.active{border-color:var(--accent);background:var(--accent-soft)}.genre-card strong{font-size:1rem}.genre-card span{color:var(--muted);font-size:.78rem;line-height:1.55}.genre-card .pill{width:max-content}.select{appearance:auto}.solve-card{max-width:48rem;margin:2rem auto 0}.solve-head{margin-bottom:1rem}.result-banner.show{display:grid;gap:.65rem;font-size:1.08rem}.result-banner.ok,.result-banner.ng{border-width:3px}.result-mark{font-size:clamp(2.3rem,12vw,4.5rem);line-height:1;font-weight:900}.result-banner.ok .result-mark{color:var(--correct)}.result-banner.ng .result-mark{color:var(--wrong)}.inline-explain{border-top:1px solid var(--border);padding-top:.75rem;color:var(--subtle);font-weight:600}.past-toolbar{grid-template-columns:1fr 1fr;align-items:end}.start-panel{min-height:auto;padding:.5rem 0 0}@media(max-width:58rem){.controls,.option-control,.past-toolbar{grid-template-columns:1fr}.subject-choice-list,.genre-list{grid-template-columns:1fr}.genre-card,.subject-choice{padding:.85rem}.step-head{gap:.5rem}.step-head h2{font-size:1.1rem}.start-panel{gap:.75rem}.big-start{width:100%}.statgrid{grid-template-columns:1fr}.stat{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem}.stat strong{font-size:1.35rem;margin-top:0}.side{order:initial}.solve-card{margin-top:1rem}.solve-head{position:sticky;top:0;background:var(--card);z-index:2;padding-bottom:.75rem}.result-banner.show{font-size:1rem}}

<body>
<main class="app">
  <header class="header">
    <div>
      <p class="kicker">Small and Medium Enterprise Management Consultant</p>
      <h1 class="title">中小企業診断士 Practice</h1>
      <p class="lead">1次試験7科目の通常問題700問と、過去10年分の過去問演習をまとめて進めます。</p>
    </div>
    <div class="head-actions">
      <nav class="tabs" aria-label="画面切替">
        <button class="tab active" data-tab="quiz">Quiz</button>
        <button class="tab" data-tab="past">Past Exams</button>
        <button class="tab" data-tab="results">Results</button>
        <button class="tab" data-tab="weak">Weak</button>
      </nav>
      <button id="themeBtn" class="icon-btn" title="Theme" aria-label="Theme">☾</button>
    </div>
  </header>

  <div class="countdown" id="countdown" aria-live="polite">
    <span>試験まで</span>
    <strong>-</strong>
  </div>

  <section id="quiz" class="section active">
    <div class="grid">
      <div class="card pad">
        <select id="quizSubject" class="hide" aria-hidden="true"></select>
        <div class="step-panel" id="subjectStep">
          <div class="step-head"><span class="pill">1/3</span><h2>科目選択</h2></div>
          <div id="subjectChoiceList" class="subject-choice-list"></div>
        </div>
        <div class="step-panel hide" id="genreStep">
          <div class="step-head"><button id="backToSubjectBtn" class="btn" type="button">← 科目</button><span class="pill">2/3</span><h2 id="genreStepTitle">ジャンル選択</h2></div>
          <div id="genreList" class="genre-list"></div>
        </div>
        <div class="step-panel hide" id="settingsStep">
          <div class="step-head"><button id="backToGenreBtn" class="btn" type="button">← ジャンル</button><span class="pill">3/3</span><h2>クイズ</h2></div>
          <div class="selection-summary" id="selectionSummary"></div>
          <div class="controls option-control">
            <label class="field">問題数<select id="quizLimit" class="select"><option>10</option><option>20</option><option>30</option><option>40</option><option>50</option><option>60</option><option>70</option><option>80</option><option>90</option><option>100</option></select></label>
            <label class="field">出題方法<select id="quizOrder" class="select"><option value="random">ランダム</option><option value="fresh">初見問題ランダム</option><option value="ebbinghaus" selected>エビングハウスの忘却曲線</option><option value="sequential">順番</option></select></label>
          </div>
          <div id="startPanel" class="start-panel">
            <button id="startBtn" class="btn primary big-start" type="button">スタート</button>
          </div>
        </div>
      </div>
      <aside class="side">
          <div class="card pad"><div class="statgrid"><div class="stat"><span>今回</span><strong id="rateStat">10問</strong></div><div class="stat"><span>初見</span><strong id="answeredStat">0</strong></div><div class="stat"><span>フラグ</span><strong id="missStat">0</strong></div><div class="stat"><span>総問題</span><strong id="totalStat">0</strong></div></div></div>
        <div id="subjectList" class="hide"></div>
      </aside>
    </div>
  </section>

  <section id="solve" class="section">
    <div class="card pad solve-card">
      <div class="between solve-head"><button id="backToSelectBtn" class="btn" type="button">← 問題選択</button><button id="flagBtn" class="btn">🚩</button></div>
      <div id="quizPanel" class="quiz-panel">
        <div class="quiz-meta"><span id="quizMeta">-</span><span id="quizCount">-</span></div>
        <div class="progress"><i id="quizProgress"></i></div>
        <div id="questionText" class="question"></div>
        <div id="choices" class="choices"></div>
        <div id="resultBanner" class="result-banner" aria-live="polite"></div>
        <div class="actions">
          <div class="row"><button id="prevBtn" class="btn">Prev</button><button id="nextBtn" class="btn primary">Next</button></div>
        </div>
      </div>
    </div>
  </section>

  <section id="past" class="section">
    <div class="card pad">
      <div class="past-toolbar">
        <label class="field">年度<select id="pastYear" class="select"></select></label>
        <label class="field">科目<select id="pastSubject" class="select"></select></label>
      </div>
      <div id="yearList" class="year-list"></div>
    </div>
  </section>

  <section id="results" class="section">
    <div class="results-grid">
      <div class="card pad"><h2>通常問題 科目別</h2><div id="quizBars"></div></div>
      <div class="card pad"><h2>過去問 進捗</h2><div id="pastBars"></div></div>
    </div>
  </section>

  <section id="weak" class="section">
    <div class="card pad"><div class="between"><h2>Flagged Questions</h2><button id="clearWeakBtn" class="btn">フラグを全解除</button></div><div id="weakList" class="weak-list" style="margin-top:1rem"></div></div>
  </section>
</main>

<div id="pingToast" class="ping-toast" aria-live="polite">ピンポン！</div>
<div id="dataModal" class="modal"><div class="modal-box"><h2>Settings</h2><p class="small">テーマを選択できます。Systemは端末設定に追従します。学習記録はこの端末のブラウザに保存されます。</p><div class="theme-options" aria-label="Theme mode"><button class="theme-choice" data-theme-choice="system" type="button">System</button><button class="theme-choice" data-theme-choice="dark" type="button">Dark</button><button class="theme-choice" data-theme-choice="light" type="button">Light</button></div><textarea id="dataBox" class="textarea" placeholder="Export / Import 用のJSON"></textarea><div class="modal-actions"><button id="exportBtn" class="btn">Export</button><button id="importBtn" class="btn">Import</button><button id="closeModal" class="btn primary">Close</button></div></div></div>

<script src="data/past_questions.js"></script>
<script>
const SUBJECTS=[
  {id:'economics',name:'経済学・経済政策',short:'経済'},
  {id:'finance',name:'財務・会計',short:'財会'},
  {id:'strategy',name:'企業経営理論',short:'経営'},
  {id:'operations',name:'運営管理',short:'運営'},
  {id:'law',name:'経営法務',short:'法務'},
  {id:'it',name:'経営情報システム',short:'情報'},
  {id:'policy',name:'中小企業経営・政策',short:'政策'}
];
const TOPICS={
  economics:[
    ['需要の価格弾力性','価格変化に対する需要量の反応度を示し、絶対値が1を超えると弾力的と判断する。',['固定費を販売量で割って短期安全性を見る。','貨幣供給量と利子率の関係だけを示す。','市場シェアの高さで競争優位を測る。'],'値上げが売上高へ与える影響を読む代表論点です。'],

function updateReview(q,ok){const r=rec(q.id),now=Date.now();r.seen=true;r.lastAt=now;r.level=ok?Math.min((r.level||0)+1,REVIEW_STEPS.length-1):0;r.dueAt=now+REVIEW_STEPS[r.level]*86400000}
function reviewPriority(q){const r=rec(q.id),now=Date.now();if(!r.seen)return 2e15+q.no;if(!r.dueAt||r.dueAt<=now)return (r.dueAt||0)-now;return r.dueAt-now+1e15}
function selectedTheme(){return localStorage.getItem('shindanshi-theme')||'light'}function resolvedTheme(mode=selectedTheme()){return mode==='system'?(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'):mode}function applyTheme(mode=selectedTheme()){document.documentElement.dataset.theme=resolvedTheme(mode);document.querySelectorAll('[data-theme-choice]').forEach(b=>b.classList.toggle('active',b.dataset.themeChoice===mode));themeBtn.textContent=resolvedTheme(mode)==='light'?'☾':'☀'}function setTheme(mode){localStorage.setItem('shindanshi-theme',mode);applyTheme(mode)}
function init(){applyTheme();updateCountdown();setInterval(updateCountdown,3600000);matchMedia('(prefers-color-scheme: light)').addEventListener('change',()=>{if(selectedTheme()==='system')applyTheme()});document.querySelectorAll('[data-theme-choice]').forEach(b=>b.onclick=()=>setTheme(b.dataset.themeChoice));quizSubject.innerHTML=SUBJECTS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');pastYear.innerHTML=`<option value="all">すべて</option>`+YEARS.map(y=>`<option value="${y[0]}">${y[0]}</option>`).join('');pastSubject.innerHTML=`<option value="all">すべて</option>`+SUBJECTS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));[quizSubject,quizLimit,quizOrder].forEach(el=>el.oninput=()=>{if(el===quizSubject)activeGenre='all';quizStarted=false;prepareQuiz();renderGenreList();renderQuizStep()});[pastYear,pastSubject].forEach(el=>el.oninput=renderPast);startBtn.onclick=beginQuiz;backToSelectBtn.onclick=()=>{quizStep='settings';renderQuizStep();showTab('quiz')};backToSubjectBtn.onclick=()=>{quizStep='subject';renderQuizStep()};backToGenreBtn.onclick=()=>{quizStep='genre';renderQuizStep()};prevBtn.onclick=()=>move(-1);nextBtn.onclick=()=>move(1);flagBtn.onclick=toggleFlag;subjectChoiceList.onclick=e=>{const b=e.target.closest('[data-subject-choice]');if(b){quizSubject.value=b.dataset.subjectChoice;activeGenre='all';quizStarted=false;prepareQuiz();quizStep='genre';renderAll()}};genreList.onclick=e=>{const b=e.target.closest('[data-genre]');if(b){activeGenre=b.dataset.genre;quizStarted=false;prepareQuiz();quizStep='settings';renderAll()}};themeBtn.onclick=()=>dataModal.classList.add('open');closeModal.onclick=()=>dataModal.classList.remove('open');exportBtn.onclick=()=>dataBox.value=JSON.stringify(store,null,2);importBtn.onclick=()=>{try{store=JSON.parse(dataBox.value);save();renderAll();alert('読み込みました')}catch{alert('JSONを確認してください')}};clearWeakBtn.onclick=()=>{Object.values(store.quiz).forEach(r=>r.flag=false);save();renderAll()};prepareQuiz();renderAll();renderGenreList();if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').then(r=>r.update()).catch(()=>{}))}
function updateCountdown(){const box=$('countdown');if(!box)return;const target=new Date(EXAM_DATE),today=new Date(),days=Math.ceil((target-today)/86400000),strong=box.querySelector('strong');strong.textContent=days>0?`あと${days}日`:days===0?'本日':'終了'}
function showTab(id){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id));renderAll()}
function renderSubjectChoices(){subjectChoiceList.innerHTML=SUBJECTS.map(s=>{const qs=QUESTIONS.filter(q=>q.subject===s.id),seen=qs.filter(q=>rec(q.id).seen).length;return `<button class="subject-choice ${s.id===quizSubject.value?'active':''}" data-subject-choice="${s.id}" type="button"><strong>${s.name}</strong><span>${seen}/${qs.length}</span></button>`}).join('')}
function renderQuizStep(){subjectStep.classList.toggle('hide',quizStep!=='subject');genreStep.classList.toggle('hide',quizStep!=='genre');settingsStep.classList.toggle('hide',quizStep!=='settings');const sub=SUBJECTS.find(s=>s.id===quizSubject.value),cat=(CATEGORY_DEFS[quizSubject.value]||[]).find(g=>g.id===activeGenre);genreStepTitle.textContent=sub?`${sub.name} / ジャンル選択`:'ジャンル選択';selectionSummary.innerHTML=`<strong>${sub?sub.name:''}</strong><span>${cat?cat.name:'全ジャンル'} / ${quizLimit.value||10}問 / ${quizOrder.options[quizOrder.selectedIndex]?.text||''}</span>`}
function beginQuiz(){quizStarted=true;prepareQuiz();showTab('solve');window.location.hash='solve'}
function prepareQuiz(){activeSubject=quizSubject.value;let qs=QUESTIONS.filter(q=>q.subject===activeSubject&&(activeGenre==='all'||q.category===activeGenre));if(quizOrder.value==='fresh')qs=qs.filter(q=>!rec(q.id).seen);if(quizOrder.value==='ebbinghaus')qs=[...qs].sort((a,b)=>reviewPriority(a)-reviewPriority(b));else if(quizOrder.value!=='sequential')qs=shuffle(qs,Date.now()%9999);set=qs.slice(0,+quizLimit.value||10);idx=0;currentResult=null;renderQuiz()}
function move(n){idx=Math.max(0,Math.min(set.length-1,idx+n));currentResult=null;renderQuiz()}function toggleFlag(){const q=set[idx];if(!q)return;rec(q.id).flag=!rec(q.id).flag;save();renderQuiz();renderSide();renderGenreList()}
function renderQuiz(){const q=set[idx];choices.innerHTML='';resultBanner.className='result-banner';resultBanner.innerHTML='';if(!q){questionText.textContent='対象問題がありません。初見問題がなくなった場合は「ランダム」を選んでください。';quizMeta.textContent='-';quizCount.textContent='0/0';quizProgress.style.width='0%';flagBtn.disabled=true;return}const r=rec(q.id);quizMeta.textContent=`${q.subjectName} / ${q.categoryName} / ${q.topic}`;quizCount.textContent=`${idx+1}/${set.length}`;quizProgress.style.width=`${((idx+1)/set.length)*100}%`;questionText.textContent=q.question;q.choices.forEach(c=>{const b=document.createElement('button');b.className='choice';b.textContent=c;if(currentResult&&currentResult.id===q.id){if(c===q.answer)b.classList.add('correct');if(currentResult.choice===c&&c!==q.answer)b.classList.add('wrong')}b.onclick=()=>answer(q,c,b);choices.appendChild(b)});if(currentResult&&currentResult.id===q.id)showResult(q,currentResult.ok,currentResult.choice);flagBtn.textContent=r.flag?'🚩 フラグ中':'🚩 フラグ';flagBtn.disabled=false;prevBtn.disabled=idx===0;nextBtn.disabled=idx===set.length-1;renderSide();renderGenreList()}
function answer(q,c,b){const ok=c===q.answer;updateReview(q,ok);save();currentResult={id:q.id,choice:c,ok};document.querySelectorAll('.choice').forEach(x=>{x.classList.remove('correct','wrong');if(x.textContent===q.answer)x.classList.add('correct');if(x.textContent===c&&c!==q.answer)x.classList.add('wrong')});showResult(q,ok,c);playTone(ok);if(ok)showPing();renderSide();renderResults();renderGenreList()}
function showResult(q,ok,c){resultBanner.className=`result-banner show ${ok?'ok':'ng'}`;resultBanner.innerHTML=`<div class="result-mark">${ok?'〇 正解':'× 不正解'}</div><div class="inline-explain"><strong>解説</strong><br>${q.explain}<br><strong>ポイント</strong><br>${examPoint(q)}</div>`}
function playTone(ok){try{const C=window.AudioContext||window.webkitAudioContext;if(!C)return;const ctx=new C();if(ctx.state==='suspended')ctx.resume();const gain=ctx.createGain();gain.connect(ctx.destination);gain.gain.setValueAtTime(.0001,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(.32,ctx.currentTime+.02);gain.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.42);(ok?[880,1320]:[330,220]).forEach((f,i)=>{const o=ctx.createOscillator();o.type=ok?'sine':'square';o.frequency.setValueAtTime(f,ctx.currentTime+i*.12);o.connect(gain);o.start(ctx.currentTime+i*.12);o.stop(ctx.currentTime+i*.12+.2)});setTimeout(()=>ctx.close(),650)}catch{}}
function showPing(){pingToast.classList.remove('show');void pingToast.offsetWidth;pingToast.classList.add('show')}
function examPoint(q){return `${q.subjectName}では、用語の丸暗記よりも「何を判断するための概念か」「似た概念とどこが違うか」が問われやすいです。${q.topic}は、問題文の条件・目的・主体を見て選択肢を切るのがポイントです。`}
function renderSide(){const subQs=QUESTIONS.filter(q=>q.subject===activeSubject),seen=subQs.filter(q=>rec(q.id).seen),flags=subQs.filter(q=>rec(q.id).flag);rateStat.textContent=`${quizLimit.value||10}問`;answeredStat.textContent=`${Math.max(0,subQs.length-seen.length)}/${subQs.length}`;missStat.textContent=flags.length;totalStat.textContent=QUESTIONS.length;subjectList.innerHTML=SUBJECTS.map(s=>{const qs=QUESTIONS.filter(q=>q.subject===s.id),f=qs.filter(q=>rec(q.id).flag).length;return `<button class="subject-btn ${s.id===activeSubject?'active':''}" data-subject="${s.id}"><span>${s.name}</span><span class="pill">🚩 ${f}</span></button>`}).join('')}
function paperHtml(p){const r=prec(p.id);return `<div class="paper"><div><div class="paper-title">${p.subject}</div><div class="small">${p.era}</div></div><div class="paper-actions"><a class="linkbtn primary" href="${p.pdf}" target="_blank" rel="noopener">問題PDF</a><a class="linkbtn" href="${p.answerPdf}" target="_blank" rel="noopener">正解表PDF</a></div><label class="done-mark ${r.done?'done':''}"><input type="checkbox" data-past-done="${p.id}" ${r.done?'checked':''}>${r.done?'完了済み':'未完了'}</label></div>`}
function renderPast(){const fy=pastYear.value||'all',fs=pastSubject.value||'all';const groups=YEARS.map(y=>({year:y,items:PAST.filter(p=>p.year===y[0]&&(fy==='all'||p.year===fy)&&(fs==='all'||p.key===fs))})).filter(g=>g.items.length);yearList.innerHTML=groups.map(g=>`<article class="card year-card"><div class="year-head"><h2>${g.year[0]}</h2><span class="pill">${g.items.length}件</span></div><div class="papers">${g.items.map(paperHtml).join('')}</div></article>`).join('')||'<p class="small">条件に合う過去問PDFがありません。</p>';document.querySelectorAll('[data-past-done]').forEach(b=>b.onchange=()=>{const r=prec(b.dataset.pastDone);r.done=b.checked;save();renderAll()})}
function renderResults(){quizBars.innerHTML=SUBJECTS.map(s=>{const qs=QUESTIONS.filter(q=>q.subject===s.id),d=qs.filter(q=>rec(q.id).seen).length,p=Math.round(d/100*100);return `<div class="barline"><strong>${s.name}</strong><div class="progress"><i style="width:${p}%"></i></div><span>${d}/100</span></div>`}).join('');pastBars.innerHTML=SUBJECTS.map(s=>{const ps=PAST.filter(p=>p.key===s.id),d=ps.filter(p=>prec(p.id).done).length,p=Math.round(d/10*100);return `<div class="barline"><strong>${s.name}</strong><div class="progress"><i style="width:${p}%"></i></div><span>${d}/10</span></div>`}).join('')}
function renderGenreList(){const subject=quizSubject.value,defs=CATEGORY_DEFS[subject]||[],all=QUESTIONS.filter(q=>q.subject===subject),past=all.filter(q=>q.category==='past'),now=Date.now();const cards=[{id:'all',name:'全ジャンル',note:'過去問抽出と通常問題をまとめて出題',topics:[]}].concat(past.length?[{id:'past',name:'過去問抽出',note:'公式PDFから本文・選択肢・正解を抽出',topics:[]}]:[],defs);genreList.innerHTML=cards.map(g=>{const qs=g.id==='all'?all:all.filter(q=>q.category===g.id),seen=qs.filter(q=>rec(q.id).seen).length,due=qs.filter(q=>rec(q.id).seen&&rec(q.id).dueAt<=now).length,flags=qs.filter(q=>rec(q.id).flag).length,quota=g.quota?`配分${g.quota}% / `:'';return `<button class="genre-card ${activeGenre===g.id?'active':''}" data-genre="${g.id}" type="button"><strong>${g.name}</strong><span>${g.note}</span><span class="pill">${quota}${qs.length}問 / 初見${qs.length-seen} / 復習${due} / 🚩${flags}</span></button>`}).join('')}
function renderWeak(){const weak=QUESTIONS.filter(q=>rec(q.id).flag);weakList.innerHTML=weak.map(q=>`<div class="weak-item"><div><strong>🚩 ${q.subjectName} No.${q.no}</strong><div class="small">${q.categoryName} / ${q.topic}</div></div><button class="btn" onclick="quizSubject.value='${q.subject}';activeGenre='${q.category}';quizOrder.value='sequential';quizLimit.value='10';quizStarted=true;set=QUESTIONS.filter(x=>x.subject==='${q.subject}'&&x.category==='${q.category}');idx=set.findIndex(x=>x.no===${q.no});currentResult=null;showTab('solve');renderQuiz()">開く</button></div>`).join('')||'<p class="small">フラグ付き問題はまだありません。</p>'}
function renderAll(){renderSide();renderPast();renderResults();renderWeak();renderSubjectChoices();renderGenreList();renderQuizStep()}init();
</script>
</body>
</html>
